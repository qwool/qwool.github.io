<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <title>qwool's startpage</title>
  <link rel="stylesheet" href="./css/styles.css">
  <style>
    #engine {
      width: 30%;
      text-align: left;
    }

    #personal {
      text-align: right;
    }

    /* The Modal (background) */
    .modal {
      display: none;
      /* Hidden by default */
      position: fixed;
      /* Stay in place */
      z-index: 1;
      /* Sit on top */
      padding-top: 100px;
      /* Location of the box */
      left: 0;
      top: 0;
      width: 100%;
      /* Full width */
      height: 100%;
      /* Full height */
      overflow: auto;
      /* Enable scroll if needed */
      background-color: rgb(0, 0, 0);
      /* Fallback color */
      background-color: rgba(0, 0, 0, 0.4);
      /* Black w/ opacity */
    }

    /* Modal Content */
    .modal-content {
      background-color: #fefefe;
      margin: auto;
      padding: 20px;
      border: 1px solid #888;
      width: 80%;
    }

    /* The Close Button */
    .close {
      color: #aaaaaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
    }

    .close:hover,
    .close:focus {
      color: #fefefe;
      /*text-decoration: none;*/
      cursor: pointer;
    }

    #search {
      width: 60%;
      border: 3px solid rgba(0, 0, 0, 0.7);
      border-radius: 10px;
      line-height: 20px;
      text-align: left;
    }

    #thing {
      font-weight: bold;
      width: 100%;
      height: 100px;
      position: absolute;
      top: 0;
      bottom: 20%;
      left: 0;
      right: 0;
      text-align: center;
      margin: auto;
    }

    @media (prefers-color-scheme: dark) {
      .modal-content {
        background-color: rgb(30, 30, 30);
        margin: auto;
        padding: 20px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 80%;
      }
      #search {
      width: 60%;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      line-height: 20px;
      text-align: left;
    }
    }
  </style>
</head>

<div id="thing">
  <h1>startpage thing</h1>
  <input type="text" id="search" name="search">
</div>
</body>

<!-- Trigger/Open The Modal -->


<!-- The Modal -->
<div id="settings" class="modal">

  <!-- Modal content -->
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>search engine</h2>
    <input type="text" id="engine" placeholder="search engine url" value="https://google.com/search?q=">
    <select id="enginesel" name="">
      <option value="https://google.com/search?q=">Google</option>
      <option value="https://duckduckgo.com/?q=">DuckDuckGo</option>
      <option value="https://bing.com/search?q=">Bing</option>
      <option value="">Other</option>
    </select>
    <h2>theme</h2>
    <input type="checkbox">bing's daily wallpaper(not made yet)</input>
  </div>

</div>


<footer>
  <a href="#" id="settingsBtn">settings</a> | <a id="personal" href="./personal/index.html">qwool, 2021</a>
</footer>

<script src="./script.js" charset="utf-8"></script>

</html>
